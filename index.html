<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valutaváltó & Bevásárló Asszisztens / Currency Converter & Shopping List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        input, select {
            font-size: 16px !important; /* iPhone zoom megelőzés */
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased flex flex-col justify-between">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Pénznemek definíciói
        const CURRENCIES = {
            HUF: { name: { hu: 'Forint', en: 'Forint' }, flag: '🇭🇺', symbol: 'Ft' },
            EUR: { name: { hu: 'Euro (Ausztria)', en: 'Euro (Austria)' }, flag: '🇪🇺', symbol: '€' },
            PLN: { name: { hu: 'Złoty (Lengyel)', en: 'Złoty (Polish)' }, flag: '🇵🇱', symbol: 'zł' },
            CZK: { name: { hu: 'Koruna (Cseh)', en: 'Koruna (Czech)' }, flag: '🇨🇿', symbol: 'Kč' },
            INR: { name: { hu: 'Rupee (Indiai)', en: 'Rupee (Indian)' }, flag: '🇮🇳', symbol: '₹' }
        };

        // Nyelvi szótár
        const TRANSLATIONS = {
            hu: {
                title: 'Utazó Kalkulátor',
                subtitle: 'Valós idejű váltás & shopping lista',
                loading: 'Árfolyamok frissítése...',
                errorTitle: 'Hiba történt ⚠️',
                errorFallback: 'Hiba az árfolyamok letöltésekor',
                retry: 'Újrapróbálkozás',
                from: 'Honnan',
                to: 'Hova',
                placeholderItem: 'Tétel neve (pl. Ebéd, Ajándék)...',
                addBtn: 'Hozzáad',
                totalCard: 'Kosár Mindösszesen:',
                clearList: 'Lista ürítése 🗑️',
                confirmClear: 'Biztosan törölni szeretnéd a teljes listát?',
                itemsTitle: 'Tételek',
                emptyList: 'A lista még üres',
                defaultItemName: 'tétel'
            },
            en: {
                title: 'Travel Calculator',
                subtitle: 'Real-time conversion & shopping list',
                loading: 'Updating exchange rates...',
                errorTitle: 'An error occurred ⚠️',
                errorFallback: 'Failed to fetch exchange rates',
                retry: 'Retry',
                from: 'From',
                to: 'To',
                placeholderItem: 'Item name (e.g., Dinner, Gift)...',
                addBtn: 'Add',
                totalCard: 'Cart Grand Total:',
                clearList: 'Clear List 🗑️',
                confirmClear: 'Are you sure you want to clear the entire list?',
                itemsTitle: 'Items',
                emptyList: 'The list is empty',
                defaultItemName: 'item'
            }
        };

        function App() {
            // Nyelv állapota (alapértelmezett a magyar, ha nincs mentve)
            const [lang, setLang] = useState(() => {
                const savedLang = localStorage.getItem('app_language');
                return savedLang === 'en' || savedLang === 'hu' ? savedLang : 'hu';
            });

            const [rates, setRates] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [fromCurr, setFromCurr] = useState('HUF');
            const [toCurr, setToCurr] = useState('EUR');
            const [amount, setAmount] = useState('');
            const [itemName, setItemName] = useState('');
            
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('shopping_list_items');
                return saved ? JSON.parse(saved) : [];
            });

            // Aktuális szótár rövidítése a kód tisztaságáért
            const t = TRANSLATIONS[lang];

            // Árfolyamok letöltése
            useEffect(() => {
                fetch('https://open.er-api.com/v6/latest/EUR')
                    .then(res => {
                        if (!res.ok) throw new Error(t.errorFallback);
                        return res.json();
                    })
                    .then(data => {
                        setRates(data.rates);
                        setLoading(false);
                    })
                    .catch(err => {
                        setError(err.message);
                        setLoading(false);
                    });
            }, [lang]);

            // Mentések localStorage-ba
            useEffect(() => {
                localStorage.setItem('shopping_list_items', JSON.stringify(items));
            }, [items]);

            useEffect(() => {
                localStorage.setItem('app_language', lang);
            }, [lang]);

            // Valutaváltás logikája
            const conversionRate = useMemo(() => {
                if (!rates[fromCurr] || !rates[toCurr]) return 1;
                return (1 / rates[fromCurr]) * rates[toCurr];
            }, [rates, fromCurr, toCurr]);

            const convertedAmount = useMemo(() => {
                const num = parseFloat(amount);
                if (isNaN(num)) return '0.00';
                return (num * conversionRate).toFixed(2);
            }, [amount, conversionRate]);

            const handleSwap = () => {
                setFromCurr(toCurr);
                setFromCurr(toCurr);
                setToCurr(fromCurr);
                setAmount(convertedAmount === '0.00' ? '' : convertedAmount);
            };

            const handleAddItem = (e) => {
                e.preventDefault();
                const numAmount = parseFloat(amount);
                const numConverted = parseFloat(convertedAmount);
                
                if (isNaN(numAmount) || numAmount <= 0) return;

                const newItem = {
                    id: Date.now(),
                    name: itemName.trim() || `${items.length + 1}. ${t.defaultItemName}`,
                    fromAmount: numAmount,
                    fromCurrency: fromCurr,
                    toAmount: numConverted,
                    toCurrency: toCurr
                };

                setItems([newItem, ...items]);
                setItemName('');
                setAmount('');
            };

            const handleDeleteItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const handleClearList = () => {
                if (confirm(t.confirmClear)) {
                    setItems([]);
                }
            };

            const totals = useMemo(() => {
                let totalFrom = 0;
                let totalTo = 0;
                items.forEach(item => {
                    const amountInEUR = item.fromAmount / rates[item.fromCurrency];
                    totalFrom += amountInEUR * rates[fromCurr];
                    totalTo += amountInEUR * rates[toCurr];
                });
                return {
                    from: isNaN(totalFrom) ? 0 : totalFrom.toFixed(2),
                    to: isNaN(totalTo) ? 0 : totalTo.toFixed(2)
                };
            }, [items, fromCurr, toCurr, rates]);

            if (loading) return (
                <div class="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-emerald-400">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-400 mb-4"></div>
                    <p class="font-medium text-sm">{t.loading}</p>
                </div>
            );

            if (error) return (
                <div class="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-red-400 p-6 text-center">
                    <p class="text-xl font-bold mb-2">{t.errorTitle}</p>
                    <p class="text-sm opacity-80">{error}</p>
                    <button onClick={() => window.location.reload()} class="mt-4 px-4 py-2 bg-slate-800 rounded-xl text-white min-h-[44px]">{t.retry}</button>
                </div>
            );

            return (
                <div class="w-full max-w-md mx-auto p-4 flex flex-col min-h-screen">
                    
                    {/* FEJLÉC ÉS NYELVVÁLASZTÓ */}
                    <header class="mb-4 flex justify-between items-start pt-2 px-1">
                        <div class="text-left">
                            <h1 class="text-2xl font-black bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">
                                {t.title}
                            </h1>
                            <p class="text-[11px] text-slate-400 mt-0.5">{t.subtitle}</p>
                        </div>
                        
                        {/* NYELV VÁLTÓ GOMB */}
                        <button 
                            onClick={() => setLang(lang === 'hu' ? 'en' : 'hu')}
                            class="bg-slate-800 hover:bg-slate-700 active:scale-95 border border-slate-700 rounded-xl px-3 py-1.5 text-xs font-black tracking-wider shadow-sm flex items-center gap-1 min-h-[44px]"
                        >
                            {lang === 'hu' ? '🇬🇧 EN' : '🇭🇺 HU'}
                        </button>
                    </header>

                    {/* VALUTAVÁLTÓ */}
                    <div class="bg-slate-800 rounded-2xl p-4 shadow-xl border border-slate-700/50 mb-4">
                        <div class="flex items-center justify-between gap-2 mb-4">
                            <div class="flex-1 bg-slate-700/40 rounded-xl p-1.5 border border-slate-700">
                                <label class="block text-[10px] font-bold text-emerald-400 uppercase tracking-wider pl-2 mb-0.5">{t.from}</label>
                                <select 
                                    value={fromCurr} 
                                    onChange={(e) => setFromCurr(e.target.value)}
                                    class="w-full bg-transparent text-white font-bold py-1 px-2 focus:outline-none appearance-none"
                                >
                                    {Object.keys(CURRENCIES).map(code => (
                                        <option key={code} value={code} class="bg-slate-800 text-white">
                                            {CURRENCIES[code].flag} {code}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <button 
                                onClick={handleSwap}
                                type="button"
                                class="w-11 h-11 flex items-center justify-center bg-slate-700 hover:bg-slate-600 active:scale-95 transition-all rounded-full border border-slate-600 shadow-md shrink-0 text-base"
                            >
                                🔄
                            </button>

                            <div class="flex-1 bg-slate-700/40 rounded-xl p-1.5 border border-slate-700">
                                <label class="block text-[10px] font-bold text-teal-400 uppercase tracking-wider pl-2 mb-0.5">{t.to}</label>
                                <select 
                                    value={toCurr} 
                                    onChange={(e) => setToCurr(e.target.value)}
                                    class="w-full bg-transparent text-white font-bold py-1 px-2 focus:outline-none appearance-none"
                                >
                                    {Object.keys(CURRENCIES).map(code => (
                                        <option key={code} value={code} class="bg-slate-800 text-white">
                                            {CURRENCIES[code].flag} {code}
                                        </option>
                                    ))}
                                </select>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="relative bg-slate-900 rounded-xl p-3 border border-slate-700 flex items-center justify-between">
                                <input 
                                    type="number" 
                                    pattern="[0-9]*"
                                    inputMode="decimal"
                                    placeholder="0"
                                    value={amount}
                                    onChange={(e) => setAmount(e.target.value)}
                                    class="w-full bg-transparent text-2xl font-black text-white focus:outline-none placeholder-slate-600 pr-8"
                                />
                                <span class="text-xl font-bold text-slate-400 shrink-0 ml-2">{CURRENCIES[fromCurr].symbol}</span>
                                {amount && (
                                    <button 
                                        onClick={() => setAmount('')}
                                        class="absolute right-12 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 w-8 h-8 flex items-center justify-center text-lg font-bold"
                                    >
                                        ✕
                                    </button>
                                )}
                            </div>

                            <div class="bg-gradient-to-r from-emerald-950/40 to-teal-950/40 border border-emerald-500/20 rounded-xl p-3 flex items-center justify-between min-h-[58px]">
                                <div class="text-2xl font-black text-emerald-400 overflow-x-auto whitespace-nowrap scrollbar-none">
                                    {Number(convertedAmount).toLocaleString(lang === 'hu' ? 'hu-HU' : 'en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                </div>
                                <span class="text-xl font-bold text-emerald-400 shrink-0 ml-2">{CURRENCIES[toCurr].symbol}</span>
                            </div>
                        </div>

                        <form onSubmit={handleAddItem} class="mt-4 pt-3 border-t border-slate-700/60 flex gap-2">
                            <input 
                                type="text" 
                                placeholder={t.placeholderItem}
                                value={itemName}
                                onChange={(e) => setItemName(e.target.value)}
                                class="flex-1 bg-slate-900 rounded-xl px-3 py-2 text-sm border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500"
                            />
                            <button 
                                type="submit"
                                disabled={!amount || parseFloat(amount) <= 0}
                                class="bg-gradient-to-r from-emerald-500 to-teal-500 disabled:from-slate-700 disabled:to-slate-700 text-slate-950 disabled:text-slate-500 font-bold px-4 py-2 rounded-xl text-sm transition-all active:scale-95 shrink-0 flex items-center justify-center min-w-[44px] min-h-[44px]"
                            >
                                ➕ {t.addBtn}
                            </button>
                        </form>
                    </div>

                    {/* NAGY TOTÁL */}
                    {items.length > 0 && (
                        <div class="bg-gradient-to-br from-slate-800 to-slate-800/90 rounded-2xl p-4 shadow-lg border-2 border-emerald-500/30 mb-4">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">{t.totalCard}</span>
                                <button onClick={handleClearList} class="text-xs text-red-400 hover:underline min-h-[44px] px-2 flex items-center">
                                    {t.clearList}
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-center pt-1">
                                <div class="bg-slate-900/60 rounded-xl p-2 border border-slate-700/50">
                                    <div class="text-xs text-slate-400">{CURRENCIES[fromCurr].name[lang]}</div>
                                    <div class="text-lg font-black text-white">
                                        {Number(totals.from).toLocaleString(lang === 'hu' ? 'hu-HU' : 'en-US')} {CURRENCIES[fromCurr].symbol}
                                    </div>
                                </div>
                                <div class="bg-emerald-950/30 rounded-xl p-2 border border-emerald-500/20">
                                    <div class="text-xs text-emerald-400">{CURRENCIES[toCurr].name[lang]}</div>
                                    <div class="text-lg font-black text-emerald-400">
                                        {Number(totals.to).toLocaleString(lang === 'hu' ? 'hu-HU' : 'en-US')} {CURRENCIES[toCurr].symbol}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LISTA TÉTELEI */}
                    <div class="flex-1 flex flex-col">
                        <h2 class="text-sm font-bold text-slate-400 mb-2 px-1 flex justify-between items-center">
                            <span>{t.itemsTitle} ({items.length})</span>
                            {items.length === 0 && <span class="text-xs font-normal italic">{t.emptyList}</span>}
                        </h2>

                        <div class="space-y-2 overflow-y-auto max-h-[40vh] pr-1 pb-6">
                            {items.map((item) => (
                                <div 
                                    key={item.id} 
                                    class="bg-slate-800/60 rounded-xl p-3 border border-slate-700/40 flex items-center justify-between gap-2"
                                >
                                    <div class="flex-1 min-w-0">
                                        <div class="font-bold text-white text-sm truncate mb-0.5">{item.name}</div>
                                        <div class="text-xs text-slate-400 flex items-center gap-1.5 flex-wrap">
                                            <span class="bg-slate-900 px-1.5 py-0.5 rounded text-slate-300 font-medium">
                                                {item.fromAmount.toLocaleString(lang === 'hu' ? 'hu-HU' : 'en-US')} {CURRENCIES[item.fromCurrency]?.symbol}
                                            </span>
                                            <span>➡️</span>
                                            <span class="bg-emerald-950/80 px-1.5 py-0.5 rounded text-emerald-400 font-bold">
                                                {item.toAmount.toLocaleString(lang === 'hu' ? 'hu-HU' : 'en-US')} {CURRENCIES[item.toCurrency]?.symbol}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={() => handleDeleteItem(item.id)}
                                        class="w-11 h-11 flex items-center justify-center text-slate-500 hover:text-red-400 rounded-full hover:bg-slate-700/50"
                                        aria-label="Delete"
                                    >
                                        ❌
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
